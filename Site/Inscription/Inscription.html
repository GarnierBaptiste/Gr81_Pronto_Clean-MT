<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clean'MT - Inscription</title>
    <link rel="stylesheet" href="../HomePage/HomePage.css" />
    <link rel="stylesheet" href="Inscription.css" />
  </head>
  <body>
    <header id="siteHeader">
      <nav id="topNav" aria-label="Navigation principale">
        <div id="navLeft">
          <div id="navLogo" aria-hidden="true"></div>
        </div>

        <div id="navLinks">
          <a class="navLink" href="../Machines/Machines.html">Machines</a>
          <a class="navLink" href="../index.html">Clean'MT</a>
          <a class="navLink" href="../CommIMT/CommIMT.html">Comm'IMT</a>
        </div>

        <div id="navRight">
          <a id="btnConnexion" href="../Connexion/Connexion.html">Se connecter</a>
        </div>
      </nav>
    </header>

    <main id="main">
      <section id="signupWrap" aria-label="Inscription">
        <h1 id="signupTitle">Inscription</h1>
        <div id="signupHint">Un email de validation sera préparé dans ton client mail.</div>

        <div class="field">
          <input
            class="input"
            id="signupEmail"
            type="email"
            placeholder="prenom.nom@imt-atlantique.net"
            autocomplete="email"
          />
          <input class="input" id="signupPass" type="password" placeholder="Mot de passe" autocomplete="new-password" />
          <input class="input" id="signupPass2" type="password" placeholder="Confirmer le mot de passe" autocomplete="new-password" />
        </div>

        <div id="signupActions">
          <button class="btn btn-primary" id="btnDoSignup" type="button">Créer mon compte</button>
          <a class="btn" href="../Connexion/Connexion.html">J'ai déjà un compte</a>
        </div>

        <div id="signupAfter" aria-live="polite" style="display: none; margin-top: 12px;"></div>
      </section>
    </main>

    <script src="../CommIMT/Auth.js" defer></script>
    <script src="Inscription.js" defer></script>
  </body>
</html>
